<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출고현황 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;color:#1e293b;-webkit-font-smoothing:antialiased;}
.dash{padding:24px;max-width:1280px;margin:0 auto;}
.sticky-top{position:sticky;top:0;z-index:100;background:#f0f4f8;padding-top:24px;margin:-24px -24px 0;padding-left:24px;padding-right:24px;}
.sticky-top .sheet-tabs-wrap{margin-bottom:0;}
.sticky-top::after{content:'';position:absolute;left:0;right:0;bottom:-12px;height:12px;background:linear-gradient(to bottom, rgba(240,244,248,1), rgba(240,244,248,0));pointer-events:none;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:18px;border-bottom:2px solid #cbd5e1;flex-wrap:wrap;gap:12px;}
.header-left{display:flex;align-items:center;gap:12px;}
.logo-box{background:#4f46e5;color:#fff;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.header-title{font-size:17px;font-weight:700;color:#0f172a;line-height:1.2;}
.header-sub{font-size:11px;color:#64748b;margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 1.5s infinite;}
.live-dot.off{background:#ef4444;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clockDisplay{color:#4f46e5;font-weight:600;}
.sync-btn{background:#f1f5f9;border:1px solid #e2e8f0;color:#4f46e5;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.sync-btn:hover{background:#eef2ff;}
.sync-btn.loading i{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.sheet-tabs-wrap{display:flex;align-items:flex-end;gap:0;margin-bottom:24px;border-bottom:2px solid #94a3b8;flex-wrap:wrap;}
.sheet-tab{display:flex;align-items:center;gap:7px;padding:10px 22px 11px;font-size:13px;font-weight:700;color:#334155;cursor:pointer;border:1.5px solid #94a3b8;border-bottom:none;border-radius:10px 10px 0 0;background:#dde3ea;margin-right:4px;transition:all .15s;position:relative;bottom:-2px;white-space:nowrap;user-select:none;}
.sheet-tab:hover{background:#cbd5e1;color:#1e293b;}
.sheet-tab.active{background:#fff;color:#4f46e5;border-color:#4f46e5;border-bottom-color:#fff;box-shadow:0 -2px 0 #4f46e5 inset;z-index:1;}
.sheet-panel{display:none;}
.sheet-panel.active{display:block;}
#panelsWrap{margin-top:24px;}
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px;}
@media(max-width:1200px){.cards{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr);}}
@media(max-width:400px){.cards{grid-template-columns:1fr;}}
.cards.ct-mode{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px;}
.cards.ct-mode .card{min-height:unset;}
.card-ct-pcs{grid-column:span 1;}
.period-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:900px){.cards.ct-mode{grid-template-columns:1fr;}}
.card{background:#fff;border:1.5px solid #cbd5e1;border-radius:14px;padding:16px;display:flex;flex-direction:column;justify-content:flex-start;min-height:100px;box-shadow:0 1px 4px rgba(15,23,42,.07);}
.card-label{font-size:11px;color:#64748b;margin-bottom:7px;font-weight:500;}
.card-value{font-size:20px;font-weight:700;color:#0f172a;line-height:1;}
.card-note{font-size:10px;color:#94a3b8;margin-top:5px;font-weight:500;}
.card-note.indigo{color:#4f46e5;font-size:12px;font-weight:700;}
.card-qty-row{display:flex;flex-direction:column;gap:5px;margin-bottom:4px;}
.card-qty-line{display:flex;align-items:baseline;gap:3px;}
.card-qty-label{font-size:20px;font-weight:700;line-height:1;flex-shrink:0;width:3.2ch;letter-spacing:-0.5px;}
.card-qty-label.pcs{color:#4f46e5;}
.card-qty-label.ct{color:#f97316;}
.card-qty-val{font-size:20px;font-weight:700;line-height:1;flex:1;text-align:left;}
.card-qty-val.pcs{color:#0f172a;}
.card-qty-val.ct{color:#f97316;}
.rank-row{display:flex;align-items:center;gap:7px;margin-top:6px;}
.rank-badge{font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px;min-width:20px;text-align:center;color:#fff;}
.rank-name{font-size:12px;font-weight:700;color:#0f172a;}
.rank-val{margin-left:auto;font-size:11px;font-weight:700;white-space:nowrap;}
.rank-sub{font-weight:500;color:#94a3b8;}
.mid{display:grid;grid-template-columns:1fr 1.5fr 1.1fr;gap:16px;margin-bottom:22px;}
@media(max-width:900px){.mid{grid-template-columns:1fr;}}
.panel{background:#fff;border:1.5px solid #cbd5e1;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(15,23,42,.07);}
.panel-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:16px;}
.donut-wrap{display:flex;justify-content:center;margin-bottom:16px;}
.donut-center-wrap{position:relative;width:170px;height:170px;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.donut-center-num{font-size:20px;font-weight:700;color:#0f172a;}
.donut-center-label{font-size:10px;color:#94a3b8;}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#475569;}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.chat-panel{display:flex;flex-direction:column;}
.chat-title-row{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.chat-title{font-size:13px;font-weight:700;color:#1e293b;}
.live-badge{background:#dcfce7;color:#15803d;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;display:flex;align-items:center;gap:3px;letter-spacing:.5px;}
.chat-box{height:230px;overflow-y:auto;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:9px;margin-bottom:10px;}
.msg-ai{background:#fff;border:1px solid #e2e8f0;border-radius:2px 10px 10px 10px;padding:9px 11px;font-size:11px;color:#1e293b;max-width:92%;line-height:1.5;}
.msg-ai-name{font-size:10px;font-weight:700;color:#4f46e5;margin-bottom:3px;}
.msg-user{background:#4f46e5;color:#fff;border-radius:10px 2px 10px 10px;padding:9px 11px;font-size:11px;max-width:85%;align-self:flex-end;line-height:1.5;}
.chat-input-row{display:flex;gap:7px;}
.chat-input{flex:1;border:1px solid #e2e8f0;border-radius:9px;padding:8px 12px;font-size:11px;background:#fff;color:#1e293b;outline:none;font-family:inherit;}
.chat-input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.08);}
.send-btn{background:#4f46e5;color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:13px;cursor:pointer;transition:background .15s;}
.send-btn:hover{background:#4338ca;}
.table-section{background:#fff;border:1.5px solid #cbd5e1;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(15,23,42,.07);}
.table-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.table-btns{display:flex;gap:8px;flex-wrap:wrap;}
.tbl-btn{font-size:11px;padding:6px 12px;border:1.5px solid #cbd5e1;border-radius:8px;background:#f8fafc;color:#64748b;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s;font-weight:500;}
.tbl-btn:hover{background:#f1f5f9;color:#1e293b;}
.tbl-btn.active{background:#eef2ff;color:#4f46e5;border-color:#c7d2fe;}
.search-panel{margin-bottom:12px;display:none;align-items:center;gap:8px;flex-wrap:wrap;}
.date-input{border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:11px;background:#fff;color:#1e293b;font-family:inherit;outline:none;}
.date-input:focus{border-color:#4f46e5;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px;}
thead tr{background:#f1f5f9;}
th{padding:10px 12px;text-align:center;font-weight:700;color:#334155;font-size:11px;white-space:nowrap;border-bottom:2px solid #cbd5e1;}
td{padding:10px 12px;color:#0f172a;border-bottom:1px solid #e2e8f0;white-space:nowrap;text-align:center;}
tbody tr:hover td{background:#f8fafc;}
tbody tr:last-child td{border-bottom:none;}
.td-date{font-weight:600;color:#1e293b;text-align:center;}
.td-total{font-weight:700;color:#4f46e5;}
.td-zero{color:#94a3b8;}
.pagination{display:flex;justify-content:center;align-items:center;gap:4px;margin-top:18px;flex-wrap:wrap;}
.pg-btn{min-width:30px;height:30px;border:1.5px solid #cbd5e1;border-radius:8px;background:#fff;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:inherit;font-weight:500;padding:0 8px;transition:all .15s;}
.pg-btn:hover{background:#f1f5f9;color:#1e293b;}
.pg-btn.active{background:#4f46e5;color:#fff;border-color:#4f46e5;font-weight:700;}
.pg-btn:disabled{opacity:.4;cursor:not-allowed;}
.bar-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.loading-msg{text-align:center;padding:60px 0;color:#94a3b8;font-size:13px;}
.err-msg{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:16px;display:none;}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;}
.date-modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.date-modal-overlay.show{display:flex;}
.date-modal{background:#fff;border-radius:16px;padding:20px;width:320px;max-width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.date-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:6px;}
.date-modal-title{font-size:14px;font-weight:700;color:#0f172a;flex:1;text-align:center;}
.cal-nav-btn,.cal-close-btn{background:#f1f5f9;border:none;width:28px;height:28px;border-radius:8px;color:#475569;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.cal-nav-btn:hover,.cal-close-btn:hover{background:#e2e8f0;}
.cal-close-btn{color:#94a3b8;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:6px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:8px;color:#cbd5e1;cursor:default;user-select:none;}
.cal-day.has-data{color:#1e293b;font-weight:600;cursor:pointer;background:#eef2ff;transition:background .15s;}
.cal-day.has-data:hover{background:#e0e7ff;}
.cal-day.selected{background:#4f46e5 !important;color:#fff;font-weight:700;}
.cal-day.empty{visibility:hidden;}
.date-modal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px;flex-wrap:wrap;}
.cal-legend{font-size:10px;color:#64748b;display:flex;align-items:center;gap:5px;}
.cal-dot{width:9px;height:9px;border-radius:3px;background:#eef2ff;border:1px solid #c7d2fe;display:inline-block;flex-shrink:0;}
</style>
</head>
<body>
<div class="dash">
  <div class="sticky-top">
    <div class="header">
      <div class="header-left">
        <div class="logo-box"><i class="ti ti-building-store"></i></div>
        <div>
          <div class="header-title">출고현황 대시보드</div>
          <div class="header-sub">
            <span class="live-dot" id="liveDot"></span>
            <span id="syncStatus">데이터 소스: Google Spreadsheets 실시간 동기화중</span> &nbsp;|&nbsp; <span id="clockDisplay">--:--:--</span>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <button class="sync-btn" id="dateSelectBtn" onclick="openDateModal()"><i class="ti ti-calendar-event"></i> <span id="dateSelectLabel">날짜선택</span></button>
        <button class="sync-btn" id="dateResetBtn" onclick="resetToLive()" style="display:none;color:#ef4444"><i class="ti ti-player-play"></i> 실시간으로</button>
        <button class="sync-btn" id="syncBtn" onclick="manualSync()"><i class="ti ti-refresh"></i> 실시간 동기화</button>
      </div>
    </div>

    <div class="err-msg" id="errMsg"></div>

    <div class="sheet-tabs-wrap" id="tabsWrap"></div>
  </div>
  <div id="panelsWrap"></div>
</div>

<div class="date-modal-overlay" id="dateModalOverlay" onclick="if(event.target===this)closeDateModal()">
  <div class="date-modal">
    <div class="date-modal-header">
      <button class="cal-nav-btn" onclick="calChangeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <div class="date-modal-title" id="calTitle">-</div>
      <button class="cal-nav-btn" onclick="calChangeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      <button class="cal-close-btn" onclick="closeDateModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="cal-weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="date-modal-footer">
      <span class="cal-legend"><span class="cal-dot"></span> 데이터 있는 날만 선택 가능</span>
      <button class="tbl-btn" onclick="resetToLive();closeDateModal();"><i class="ti ti-player-play"></i> 실시간(오늘)으로 보기</button>
    </div>
  </div>
</div>

<script>
// ──────────────── 설정 ────────────────
const SHEET_ID = '1suB4sm5wXRlUt2BBUdNW_gOJdIS45-CwDJ3Bgep85a0';
const REFRESH_MS = 30000;

const TABS = [
  { id:'rtw-on',  label:'RTW온라인',  sheetName:'온라인 출고', group:'RTW', brands:['루에브르','레이브','조이그라이슨','테누브','반로에','온앤온'] },
  { id:'bag-on',  label:'BAG온라인',  sheetName:'온라인 출고', group:'BAG', brands:['루에브르','레이브','조이그라이슨','테누브','반로에','포에티시'] },
  { id:'rtw-off', label:'오프라인', sheetName:'오프라인 출고', group:'RTW', brands:['조이그라이슨','루에브르','레이브','온앤온(정상)','온앤온(상설)'], ctPcs:true },
  { id:'kpi',     label:'인력KPI',    sheetName:'온라인 출고', group:'KPI', brands:[] },
];
// KPI 전용 컬럼명 (구글시트 헤더와 일치 필요)
const KPI_COL = { total:'전체출고량', miss:'오배송', headcount:'당일근무인원' };
const WORK_HOURS = 7; // 근무시간 기준(시간)
// ── 브랜드별 고정 색상 (모든 시트/차트 공통) ──────────────────────────
// 시트(RTW온라인·BAG온라인·오프라인)와 무관하게
// 브랜드명만으로 색상을 고정 — 어느 시트에서나 동일 색상 보장
const BRAND_COLORS = {
  '루에브르':    '#4f46e5',  // 인디고
  '레이브':      '#06b6d4',  // 시안
  '조이그라이슨':'#10b981',  // 에메랄드
  '테누브':      '#f59e0b',  // 앰버
  '반로에':      '#ef4444',  // 레드
  '온앤온':      '#8b5cf6',  // 바이올렛
  '포에티시':    '#f97316',  // 오렌지
  // 온앤온 파생 브랜드 → 각각 독립 색상
  '온앤온(정상)':'#ec4899',  // 핑크
  '온앤온(상설)':'#14b8a6',  // 틸
};
// fallback 팔레트 — 위에 없는 신규 브랜드도 이름 해시로 항상 동일 색 배정
const COLORS = ['#4f46e5','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#f97316','#a78bfa','#14b8a6','#fb7185','#34d399','#fbbf24'];
function brandColor(name){
  if(BRAND_COLORS[name]) return BRAND_COLORS[name];
  // 이름 해시 → COLORS 인덱스 고정 (같은 브랜드명은 항상 같은 색)
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = (hash*31 + name.charCodeAt(i)) >>> 0;
  return COLORS[hash % COLORS.length];
}
const perPage = 8;

const sheetCache = {};      // sheetName -> parsed rows (array of raw record objects)
const tabData    = {};      // tab.id -> {rows:[{date,vals:{brand:val},total}], byMonth:{...}}
const sheetState = {};
TABS.forEach(t=>{ sheetState[t.id] = { hideZero:true, currentPage:1 }; }); // hideZero 항상 true 고정
const charts = {};
let activeTab = TABS[0].id;
let selectedRefDate = null; // 사용자가 선택한 날짜('YYYY/M/D'), null이면 실시간(오늘) 기준
let calYear, calMonth; // 날짜선택 캘린더가 보여주는 연/월(월은 0-index)

function num(v){
  if(v===undefined||v===null) return 0;
  const n = parseFloat(String(v).replace(/,/g,'').trim());
  return isNaN(n) ? 0 : n;
}

/**
 * 구글시트(gviz) JSON 데이터를 <script> 태그(JSONP) 방식으로 가져와 {headers, rows} 형태로 반환.
 *
 * fetch()로 gviz/tq를 직접 호출하면 브라우저가 CORS 정책을 적용해서
 * 로컬 파일(file://)이나 일부 환경에서 "Failed to fetch"로 막히는 경우가 많다.
 * <script src="..."> 로 불러오면 CORS 검사 자체가 적용되지 않으므로(JSONP),
 * gviz가 기본 제공하는 responseHandler 파라미터로 콜백 함수명을 지정해 안전하게 받아온다.
 *
 * @param {string} sheetId   구글시트 ID
 * @param {string} sheetName 탭(시트) 이름. 비우면 첫 번째 탭
 * @param {number} timeoutMs 응답 대기 제한시간 (기본 15초)
 */
let __gvizCounter = 0;
function fetchGoogleSheetJSON(sheetId, sheetName = '', timeoutMs = 15000){
  return new Promise((resolve, reject) => {
    const cbName = `__gvizCb_${Date.now()}_${__gvizCounter++}`;
    let settled = false;

    const script = document.createElement('script');

    function cleanup(){
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    const timer = setTimeout(() => {
      if (settled) return;
      settled = true;
      cleanup();
      console.error('[GSheet] 응답 시간 초과:', { sheetId, sheetName, timeoutMs });
      reject(new Error('구글시트 응답이 없습니다(시간 초과). 네트워크 상태 또는 시트 공개 설정을 확인하세요.'));
    }, timeoutMs);

    window[cbName] = function(data){
      if (settled) return;
      settled = true;
      cleanup();

      if (!data) {
        console.error('[GSheet] 빈 응답:', { sheetId, sheetName });
        reject(new Error('구글시트에서 빈 응답을 받았습니다.'));
        return;
      }
      if (data.status === 'error') {
        const reasons = (data.errors || []).map(e => e.detailed_message || e.message).join(' / ');
        console.error('[GSheet] 구글 응답 자체가 오류:', reasons, data);
        reject(new Error(`구글시트 오류: ${reasons || '알 수 없는 오류'} (탭 이름 "${sheetName}"이 맞는지 확인하세요)`));
        return;
      }

      const table = data.table || {};

      // ── 헤더 라벨 정규화 함수 ──────────────────────────────────────
      // 구글 gviz는 병합셀(1행+2행)을 합쳐서 cols.label에 넣는다.
      // 예: 1행="RTW", 2행="루에브르", 3행="RTW_루에브르"
      //  → label = "RTW 루에브르 RTW_루에브르"  (공백으로 합쳐진 형태)
      // 또는 1행="일자", 2행="일자" → label = "일자 일자"
      // 실제 키는 항상 마지막 단어(underscore 포함 or 단독 한글 키)이므로
      // 마지막 공백-분리 토큰을 추출해 정규 헤더로 사용한다.
      function normalizeLabel(raw){
        if (!raw) return '';
        const s = String(raw).trim();
        if (!s) return '';
        const parts = s.split(/\s+/);
        const last = parts[parts.length - 1];

        // ── 오프라인 시트 병합셀 처리 ──────────────────────────────────
        // gviz는 병합셀을 "RTW 조이그라이슨 C/T" 식으로 합쳐서 넘겨줌
        // last가 C/T 또는 PCS 이면 → GROUP_브랜드명_C/T 형태로 재조립
        // ※ 구글시트 실제 헤더가 "RTW_조이그라이슨_C/T" 이므로 슬래시 그대로 유지
        if ((last === 'C/T' || last === 'PCS') && parts.length >= 3) {
          const group  = parts[0];
          const brand  = parts.slice(1, parts.length - 1).join(' ');
          return `${group}_${brand}_${last}`; // last = 'C/T' or 'PCS' 그대로
        }
        return last;
      }

      function cellVal(cell){
        if (!cell) return null;
        if (cell.f !== undefined && cell.f !== null) return String(cell.f);
        return cell.v !== undefined ? cell.v : null;
      }

      const rawRows = (table.rows || []).map(r => (r.c || []).map(cellVal));
      const colLabels = (table.cols || []).map(c => (c.label || '').trim());
      const hasRealLabels = colLabels.some(l => l !== '' && !/^[A-Z]{1,2}$/.test(l));

      // ── 헤더 행 위치를 "고정 offset"이 아니라 내용("일자" 셀)으로 직접 탐색 ──
      // 기존에는 tq=offset 2로 "항상 1·2행이 병합 제목행"이라고 가정했는데,
      // 시트에서 행을 삭제하거나 숨기면 실제 행 위치가 위/아래로 밀려서
      // 엉뚱한 행을 헤더로 읽어버리는 문제가 있었다.
      // → offset 없이 전체 행을 받아온 뒤, "일자" 라는 값이 들어있는 행을
      //   직접 찾아 그 행을 헤더로 사용하면 행이 삭제/숨김 되어도 항상 정확히 찾는다.
      function findHeaderRowIdxByContent(rowsArr){
        const limit = Math.min(rowsArr.length, 20); // 상단 20행 안에서 탐색(충분히 넉넉한 범위)
        for (let i = 0; i < limit; i++) {
          const r = rowsArr[i] || [];
          const hit = r.some(v => String(v ?? '').trim() === '일자');
          if (hit) return i;
        }
        return -1;
      }

      let headers, rows;
      const contentHeaderIdx = findHeaderRowIdxByContent(rawRows);

      if (contentHeaderIdx !== -1) {
        // "일자" 값이 들어있는 실제 행을 헤더로 사용 (행 삭제/숨김에도 항상 정확)
        headers = rawRows[contentHeaderIdx].map(v => normalizeLabel(v === null || v === undefined ? '' : String(v)));
        rows = rawRows.slice(contentHeaderIdx + 1);
      } else if (hasRealLabels) {
        // 폴백 1: gviz가 cols 라벨에 헤더 값을 넣어준 경우 → 정규화해서 사용
        headers = colLabels.map(normalizeLabel);
        rows = rawRows;
      } else {
        // 폴백 2: cols 라벨이 A, B, C … 뿐이고 "일자"도 못 찾은 경우
        // → 그래도 최대한 동작하도록 rows[0]을 헤더로 간주(기존 동작 유지)
        if (rawRows.length === 0) {
          reject(new Error('시트에서 데이터를 가져오지 못했습니다. 시트 공개 설정을 확인하세요.'));
          return;
        }
        headers = rawRows[0].map(v => normalizeLabel(v === null || v === undefined ? '' : String(v)));
        rows = rawRows.slice(1);
      }

      // 완전히 빈 행(모든 셀이 null/빈 문자열)은 데이터로 취급하지 않음.
      // → 행을 "삭제"하지 않고 내용만 지우거나, 중간에 빈 행이 남아도 안전하게 무시.
      rows = rows.filter(r => (r || []).some(v => v !== null && v !== undefined && String(v).trim() !== ''));

      console.log('[GSheet] 파싱 완료:', { sheetName, hasRealLabels, contentHeaderIdx, headers, rowCount: rows.length });
      // 오프라인 시트 C/T·PCS 디버그
      if(sheetName && sheetName.includes('오프라인')){
        const ctKeys = headers.filter(h=>h&&(h.endsWith('_C/T')||h.endsWith('_CT')));
        const pcsKeys = headers.filter(h=>h&&h.endsWith('_PCS'));
        console.log('[GSheet 오프라인] CT 컬럼:', ctKeys);
        console.log('[GSheet 오프라인] PCS 컬럼:', pcsKeys);
        if(rows[0]) console.log('[GSheet 오프라인] 첫 데이터 행 샘플:', rows[0].slice(0,Math.min(rows[0].length,16)));
      }
      resolve({ headers, rows });
    };

    script.onerror = () => {
      if (settled) return;
      settled = true;
      cleanup();
      console.error('[GSheet] 스크립트 로드 실패 (네트워크 차단 또는 비공개 시트 가능성):', { sheetId, sheetName });
      reject(new Error('구글시트에 접속할 수 없습니다. 시트가 "링크가 있는 모든 사용자(뷰어)"로 공유되어 있는지 확인하세요.'));
    };

    // ── URL 구성 ─────────────────────────────────────────────────────
    // range/headers 파라미터를 쓰면 특정 환경에서 400 오류가 발생한다.
    // ※ 예전에는 tq="select * offset 2"로 "항상 1·2행이 병합 제목행"이라고
    //   가정하고 고정 위치로 건너뛰었다. 하지만 사용자가 시트에서 행을
    //   삭제하거나 숨기면 실제 행 위치가 밀려서 엉뚱한 행을 헤더/데이터로
    //   읽어버리는 문제가 있었다. 이제는 offset 없이 전체 행을 그대로 받아온
    //   뒤, 응답 처리 단계에서 "일자" 셀이 있는 행을 직접 찾아 헤더로 쓰므로
    //   행 삭제/숨김과 무관하게 항상 정확하게 동작한다.
    const params = new URLSearchParams({
      tqx: `out:json;responseHandler:${cbName}`,
      tq:  'select *',   // offset 제거: 행 삭제/숨김에도 안전하게 동작하도록 전체 행 수신
      _:   Date.now()             // 캐시 방지
    });
    if (sheetName) params.set('sheet', sheetName);

    script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?${params.toString()}`;
    document.head.appendChild(script);
  });
}

/**
 * gviz JSON 결과를 record 객체 배열로 변환.
 * 구글이 헤더 행을 어떻게 처리하는지(요청한 headers=0을 무시하고 자체적으로
 * 헤더를 떼어내 table.cols 라벨에 넣어버리는 경우도 있음)는 예측하기 어려워서,
 * 1) 먼저 cols 라벨(headers)에 "일자"가 있는지 확인하고
 * 2) 없으면 rows 안에서 "일자" 텍스트가 들어있는 행을 직접 찾아 그 행을 헤더로 쓴다.
 */
function jsonToRecords(headers, rows){
  // fetchGoogleSheetJSON에서 이미 normalizeLabel()을 통해
  // "일자 일자" → "일자", "RTW 루에브르 RTW_루에브르" → "RTW_루에브르" 로 정규화됨.
  const hdrs = (headers || []).map(v => (v === null || v === undefined ? '' : String(v).trim()));

  // "일자" 컬럼 위치 찾기 (포함 검색으로 안전하게)
  let dateIdx = hdrs.findIndex(h => h === '일자');
  if (dateIdx === -1) dateIdx = hdrs.findIndex(h => h.includes('일자'));

  if (dateIdx !== -1) {
    // 정상 케이스: headers에 "일자"가 있음
    const records = [];
    rows.forEach(r => {
      const dateVal = (r || [])[dateIdx];
      if (dateVal === null || dateVal === undefined || String(dateVal).trim() === '') return;
      if (String(dateVal).trim() === '일자') return; // 혹시 남은 헤더 행 스킵
      const rec = {};
      hdrs.forEach((k, i) => { if (k) rec[k] = (r || [])[i]; });
      records.push(rec);
    });
    if (records.length) return records;
  }

  // 폴백: rows 안에서 "일자" 텍스트가 있는 행을 헤더로 직접 탐색
  let headerRowIdx = -1, dateColIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const r = rows[i] || [];
    const idx = r.findIndex(v => String(v ?? '').trim() === '일자');
    if (idx !== -1) { headerRowIdx = i; dateColIdx = idx; break; }
  }

  if (headerRowIdx === -1) {
    console.error('[GSheet] "일자" 컬럼을 어디서도 찾을 수 없습니다.', { headers, sampleRows: rows.slice(0, 5) });
    const e = new Error('시트에서 "일자" 컬럼을 찾을 수 없습니다. 시트 헤더 구조나 탭 이름을 확인하세요.');
    e.debugData = { headers, rows: rows.slice(0, 5) };
    throw e;
  }

  const keyRow = (rows[headerRowIdx] || []).map(v => (v === null || v === undefined ? '' : String(v).trim()));
  const records = [];
  for (let i = headerRowIdx + 1; i < rows.length; i++) {
    const r = rows[i] || [];
    const dateVal = r[dateColIdx];
    if (dateVal === null || dateVal === undefined || String(dateVal).trim() === '') continue;
    const rec = {};
    keyRow.forEach((k, idx) => { if (k) rec[k] = r[idx]; });
    records.push(rec);
  }
  return records;
}

async function fetchSheet(sheetName){
  const { headers, rows } = await fetchGoogleSheetJSON(SHEET_ID, sheetName);
  return { headers, records: jsonToRecords(headers, rows) };
}

/**
 * 시트 헤더에서 특정 그룹(RTW/BAG)에 속한 브랜드명을 자동으로 감지한다.
 * 헤더가 "RTW_루에브르" 형태이면 "RTW_" 접두사를 떼고 "루에브르"를 브랜드명으로 인식.
 * "RTW_합계"(총합 컬럼)는 브랜드가 아니므로 제외한다.
 * → 구글시트에 새 브랜드 컬럼이 추가되면 코드 수정 없이 자동으로 목록에 반영됨.
 */
function detectBrandsFromHeaders(headers, group){
  const prefix = group + '_';
  const found = [];
  (headers || []).forEach(h=>{
    const s = (h===null||h===undefined) ? '' : String(h).trim();
    if(!s.startsWith(prefix)) return;
    let name = s.slice(prefix.length).trim();
    name = name.replace(/_(C\/T|CT|PCS)$/i, '').trim(); // 오프라인 시트의 "_C/T"/"_CT"/"_PCS" 접미사 제거
    if(!name || name === '합계' || name === '합계(CT)' || name === '합계(PCS)') return;
    if(!found.includes(name)) found.push(name);
  });
  // 접두사(RTW_/BAG_)가 없는 시트(예: 오프라인 시트가 단일 그룹으로 통합된 경우)에 대한 폴백:
  // "브랜드_C/T" / "브랜드_PCS" 형태의 헤더를 접두사 없이 그대로 브랜드로 인식한다.
  if(!found.length){
    (headers || []).forEach(h=>{
      const s = (h===null||h===undefined) ? '' : String(h).trim();
      if(!s || !/_(C\/T|CT|PCS)$/i.test(s)) return;
      let name = s.replace(/_(C\/T|CT|PCS)$/i, '').trim();
      if(!name || name === '합계') return;
      if(!found.includes(name)) found.push(name);
    });
  }
  return found;
}

function parseDate(raw){
  if (raw === null || raw === undefined) return '';
  const s = String(raw).trim();
  const now = new Date();
  const curYear = now.getFullYear();
  // "Date(2025,5,26)" 형태 → YYYY/M/D (연도 포함)
  const dm = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dm) return `${parseInt(dm[1])}/${parseInt(dm[2])+1}/${parseInt(dm[3])}`;
  // "2025-06-26" 또는 "2025/06/26" 형태 (연도 포함)
  const iso = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
  if (iso) return `${parseInt(iso[1])}/${parseInt(iso[2])}/${parseInt(iso[3])}`;
  // "6/26" 형태 (연도 없음) → 현재 연도 기준으로 추정
  if (/^\d{1,2}\/\d{1,2}$/.test(s)) {
    const parts = s.split('/');
    const month = parseInt(parts[0], 10);
    const day = parseInt(parts[1], 10);
    // 해당 월/일이 오늘보다 미래면 작년으로 간주
    const candidate = new Date(curYear, month - 1, day);
    const year = candidate > now ? curYear - 1 : curYear;
    return `${year}/${month}/${day}`;
  }
  return s;
}
// 내부 포맷 "YYYY/M/D" → 표시용 "M/D"
function displayDate(d){ const p=String(d).split('/'); return p.length===3?`${p[1]}/${p[2]}`:d; }

const DAY_KO = ['일','월','화','수','목','금','토'];
function getDayOfWeek(dateStr){
  // dateStr: "YYYY/M/D" 형태
  const parts = String(dateStr).split('/');
  if(parts.length === 3){
    const d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
    return DAY_KO[d.getDay()];
  }
  // fallback: "M/D" 형태
  if(parts.length === 2){
    const now = new Date();
    const d = new Date(now.getFullYear(), parseInt(parts[0],10)-1, parseInt(parts[1],10));
    return DAY_KO[d.getDay()];
  }
  return '';
}

// rec에서 접두사가 붙은 키(RTW_브랜드_C/T)를 우선 찾고, 없으면 접두사 없는 키(브랜드_C/T)로 폴백한다.
// → 오프라인 시트처럼 그룹 접두사가 없는 경우에도 정상적으로 값을 읽어온다.
function pickField(rec, prefixedKey, plainKey){
  if(rec[prefixedKey] !== undefined) return num(rec[prefixedKey]);
  return num(rec[plainKey]);
}

function buildTabRows(tab, records){
  const key = tab.group; // 'RTW' or 'BAG'
  return records.map(rec=>{
    const vals = {};
    const ct = {};
    if(tab.ctPcs){
      tab.brands.forEach(b=>{
        // 구글시트 실제 헤더: RTW_조이그라이슨_C/T 또는 조이그라이슨_C/T(접두사 없음)
        ct[b]   = pickField(rec, key+'_'+b+'_C/T', b+'_C/T');
        vals[b] = pickField(rec, key+'_'+b+'_PCS', b+'_PCS');
      });
    } else {
      tab.brands.forEach(b=>{ vals[b] = pickField(rec, key+'_'+b, b); });
    }
    let total = pickField(rec, key+'_합계_PCS', '합계_PCS') || pickField(rec, key+'_합계', '합계') || 0;
    if(!total) total = tab.brands.reduce((s,b)=>s+vals[b],0);
    let totalCt = pickField(rec, key+'_합계_C/T', '합계_C/T') || pickField(rec, key+'_합계_CT', '합계_CT') || 0;
    if(!totalCt && tab.ctPcs) totalCt = tab.brands.reduce((s,b)=>s+ct[b],0);
    const row = { date: parseDate(rec['일자']), vals, total };
    if(tab.ctPcs){ row.ct = ct; row.totalCt = totalCt; }
    return row;
  }).filter(r => r.date !== '');
}

// ──────────────── KPI 행 파싱 ────────────────
function buildKpiRows(records){
  return records.map(rec => {
    const date  = parseDate(rec[KPI_COL.total] !== undefined ? rec['일자'] : rec['일자']);
    const total = num(rec[KPI_COL.total]);
    const miss  = num(rec[KPI_COL.miss]);
    const heads = num(rec[KPI_COL.headcount]);
    const missRate  = total > 0 ? (miss / total * 100) : 0;
    const perHead   = heads > 0 ? total / heads : 0;
    const perHour   = heads > 0 ? total / (heads * WORK_HOURS) : 0;
    return { date: parseDate(rec['일자']), total, miss, heads, missRate, perHead, perHour };
  }).filter(r => r.date !== '');
}

async function loadAll(isManual){
  const btn = document.getElementById('syncBtn');
  btn.classList.add('loading');
  try{
    const sheetNames = [...new Set(TABS.map(t=>t.sheetName))];
    const fetched = {};
    for(const sn of sheetNames){ fetched[sn] = await fetchSheet(sn); }
    TABS.forEach(t=>{
      const { headers, records } = fetched[t.sheetName];
      if(t.id==='kpi'){
        tabData[t.id] = { rows: buildKpiRows(records) };
      } else {
        // 모든 탭 헤더 자동 감지로 브랜드 갱신 (온라인·오프라인 모두 구글시트 브랜드 추가 시 자동 반영)
        const detected = detectBrandsFromHeaders(headers, t.group);
        if(detected.length) t.brands = detected;
        tabData[t.id] = { rows: buildTabRows(t, records) };
      }
    });
    document.getElementById('errMsg').style.display='none';
    document.getElementById('liveDot').classList.remove('off');
    document.getElementById('syncStatus').textContent = '데이터 소스: Google Spreadsheets 실시간 동기화중';
    renderTab(activeTab, true);
    if(isManual){
      btn.innerHTML = '<i class="ti ti-check"></i> 동기화 완료';
      setTimeout(()=>{ btn.innerHTML = '<i class="ti ti-refresh"></i> 실시간 동기화'; }, 1500);
    }
  }catch(e){
    document.getElementById('liveDot').classList.add('off');
    document.getElementById('syncStatus').textContent = '동기화 오류 - 마지막 데이터 표시중';
    const em = document.getElementById('errMsg');

function getTab(id){ return TABS.find(t=>t.id===id); }

function findRefIndex(rows){
  // 사용자가 날짜선택 캘린더로 특정 날짜를 골랐다면 그 날짜를 최우선으로 사용
  if(selectedRefDate){
    const selIdx = rows.findIndex(r => r.date === selectedRefDate);
    if(selIdx !== -1) return selIdx;
  }
  // 오늘 날짜(현재 시간 기준) 우선 탐색 - YYYY/M/D 형식으로 정확 매칭
  const now = new Date();
  const todayKey = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const todayIdx = rows.findIndex(r => r.date === todayKey);
  if(todayIdx !== -1 && rows[todayIdx].total > 0) return todayIdx;
  // 오늘 데이터가 없거나(행이 없거나) 0건이면, 데이터가 있는 가장 최근 날짜로 대체
  for(let i=rows.length-1;i>=0;i--) if(rows[i].total>0) return i;
  return rows.length-1;
}
function monthOf(dateStr){ const p=String(dateStr).split('/'); return p.length===3?parseInt(p[1],10):parseInt(p[0],10); }

// ──────────────── 날짜선택(캘린더) ────────────────
// 모든 탭(시트)에 걸쳐 실제로 행이 존재하는 날짜만 모아서, 캘린더에서 선택 가능하게 만든다.
function getAvailableDateSet(){
  const set = new Set();
  Object.values(tabData).forEach(td=>{
    (td.rows||[]).forEach(r=>{ if(r.date && r.total>0) set.add(r.date); });
  });
  return set;
}

function openDateModal(){
  const avail = getAvailableDateSet();
  if(avail.size === 0){
    alert('아직 불러온 데이터가 없습니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  const now = new Date();
  let baseY = now.getFullYear(), baseM = now.getMonth();
  if(selectedRefDate){
    const p = selectedRefDate.split('/').map(Number);
    baseY = p[0]; baseM = p[1]-1;
  } else {
    // 선택된 날짜가 없으면, 데이터가 있는 가장 최근 달을 기본으로 보여준다
    const sorted = [...avail].sort((a,b)=>{
      const pa=a.split('/').map(Number), pb=b.split('/').map(Number);
      return (pa[0]-pb[0])||(pa[1]-pb[1])||(pa[2]-pb[2]);
    });
    const last = sorted[sorted.length-1];
    if(last){ const p=last.split('/').map(Number); baseY=p[0]; baseM=p[1]-1; }
  }
  calYear = baseY; calMonth = baseM;
  document.getElementById('dateModalOverlay').classList.add('show');
  renderCalendar();
}
function closeDateModal(){
  document.getElementById('dateModalOverlay').classList.remove('show');
}
function calChangeMonth(delta){
  calMonth += delta;
  if(calMonth < 0){ calMonth = 11; calYear--; }
  if(calMonth > 11){ calMonth = 0; calYear++; }
  renderCalendar();
}
function renderCalendar(){
  const avail = getAvailableDateSet();
  document.getElementById('calTitle').textContent = `${calYear}년 ${calMonth+1}월`;
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  let html = '';
  for(let i=0;i<firstDow;i++) html += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const key = `${calYear}/${calMonth+1}/${d}`;
    const hasData = avail.has(key);
    const isSelected = selectedRefDate === key;
    html += `<div class="cal-day ${hasData?'has-data':''} ${isSelected?'selected':''}" ${hasData?`onclick="pickDashboardDate('${key}')"`:''}>${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}
function pickDashboardDate(key){
  selectedRefDate = key;
  closeDateModal();
  updateDateButtonUI();
  refreshCurrentTabForDate();
}

}
function updateDateButtonUI(){
  const label = document.getElementById('dateSelectLabel');
  const resetBtn = document.getElementById('dateResetBtn');
  const btn = document.getElementById('dateSelectBtn');

  }
}

function rankList(slice, brands){
  const sum = {}; brands.forEach(b=>sum[b]=0);
  let tot=0;
  slice.forEach(r=>{ brands.forEach(b=>{ sum[b]+=r.vals[b]||0; }); tot+=r.total; });
  return brands.map(b=>({name:b,val:sum[b]}))
    .filter(b=>b.val>0)
    .sort((a,b)=>b.val-a.val)
    .map(b=>({...b, pct: tot>0 ? (b.val/tot*100) : 0}));
}

function renderCardsForTab(tab, rows){
  const wrap = document.getElementById('cards-'+tab.id);
  if(rows.length===0){ wrap.innerHTML = '<div class="card">데이터가 없습니다.</div>'; return; }
  const refIdx = findRefIndex(rows);
  const ref = rows[refIdx];
  const weekSlice = rows.slice(Math.max(0, refIdx-6), refIdx+1);
  const monthSlice = rows.filter(r=> monthOf(r.date)===monthOf(ref.date));
  const weekActive = weekSlice.filter(r=>r.total>0).length || 1;
  const monthActive = monthSlice.filter(r=>r.total>0).length || 1;
  const weekTotal = weekSlice.reduce((s,r)=>s+r.total,0);
  const monthTotal = monthSlice.reduce((s,r)=>s+r.total,0);
  // C/T 합산 (3·4번 오프라인 시트 전용)
  const refCt    = tab.ctPcs ? (ref.totalCt||0) : 0;
  const weekCt   = tab.ctPcs ? weekSlice.reduce((s,r)=>s+(r.totalCt||0),0) : 0;
  const monthCt  = tab.ctPcs ? monthSlice.reduce((s,r)=>s+(r.totalCt||0),0) : 0;

  function rankHtml(list, max){
    return list.slice(0,max||3).map((b,i)=>`
      <div class="rank-row">
        <span class="rank-badge" style="background:${brandColor(b.name)}">${i+1}</span>
        <span class="rank-name">${b.name}</span>
        <span class="rank-val" style="color:${brandColor(b.name)}">${b.pct.toFixed(1)}% <span class="rank-sub">(${b.val.toLocaleString()}PCS)</span></span>
      </div>`).join('');
  }

  const todayRank = rankList([ref], TABSBrandsOf(tab));
  const weekRank  = rankList(weekSlice, TABSBrandsOf(tab));
  const monthRank = rankList(monthSlice, TABSBrandsOf(tab));

  // 주간·월간 C/T 일평균
  const weekCtAvg  = tab.ctPcs ? Math.round(weekCt  / weekActive)  : 0;
  const monthCtAvg = tab.ctPcs ? Math.round(monthCt / monthActive) : 0;
  const avgNote = (pcsAvg, ctAvg) => tab.ctPcs
    ? `<div class="card-note indigo">일평균 ${pcsAvg.toLocaleString()}PCS</div>`
    : `<div class="card-note indigo">일평균 ${pcsAvg.toLocaleString()}PCS</div>`;
  const avgNoteCt = (ctAvg) =>
    `<div class="card-note indigo">일평균 ${ctAvg.toLocaleString()}C/T</div>`;

  if(tab.ctPcs){
    // ── 오프라인 시트: 수량 카드를 PCS(상단)·C/T(하단) 2개로 분리 ──
    // 그리드 레이아웃: 컬럼1=당일PCS, 컬럼2=당일순위, 컬럼3=주간PCS, 컬럼4=주간순위, 컬럼5=월간PCS, 컬럼6=월간순위
    //                  컬럼1=당일CT,  (순위 없음→span2), 컬럼3=주간CT,  (span2),         컬럼5=월간CT,  (span2)
    wrap.classList.add('ct-mode');
    wrap.innerHTML = `
      <div class="period-cards">
        <div class="card card-ct-pcs">
          <div>
            <div class="card-label">당일 출고 수량</div>
            <div class="card-value">${ref.total.toLocaleString()} PCS</div>
            <div class="card-note">${displayDate(ref.date)} 기준</div>
          </div>
        </div>
        <div class="card card-ct-pcs" style="grid-row:span 2">
          <div class="card-label">당일 출고 순위 <span style="font-size:10px;color:#94a3b8">(${displayDate(ref.date)} 기준)</span></div>
          ${rankHtml(todayRank)}
        </div>
        <div class="card card-ct-pcs">
          <div>
            <div class="card-label">당일 출고 수량</div>
            <div class="card-value">${refCt.toLocaleString()} C/T</div>
            <div class="card-note">${displayDate(ref.date)} 기준</div>
          </div>
        </div>
      </div>
      <div class="period-cards">
        <div class="card card-ct-pcs">
          <div>
            <div class="card-label">주간 출고 수량</div>
            <div class="card-value">${weekTotal.toLocaleString()} PCS</div>
            ${avgNote(Math.round(weekTotal/weekActive), weekCtAvg)}
            <div class="card-note">${displayDate(weekSlice[0].date)} ~ ${displayDate(ref.date)} · 근무 ${weekSlice.filter(r=>r.total>0).length}일</div>
          </div>
        </div>
        <div class="card card-ct-pcs" style="grid-row:span 2">
          <div class="card-label">주간 출고 순위</div>
          ${rankHtml(weekRank)}
        </div>

            <div class="card-value">${weekCt.toLocaleString()} C/T</div>
            ${avgNoteCt(weekCtAvg)}
            <div class="card-note">${displayDate(weekSlice[0].date)} ~ ${displayDate(ref.date)} · 근무 ${weekSlice.filter(r=>r.total>0).length}일</div>
          </div>
        </div>
      </div>
      <div class="period-cards">
        <div class="card card-ct-pcs">
          <div>
            <div class="card-label">월간 출고 수량</div>
            <div class="card-value">${monthTotal.toLocaleString()} PCS</div>
            ${avgNote(Math.round(monthTotal/monthActive), monthCtAvg)}

      </div>
    `;
  } else {
    // ── 온라인 시트: 기존 방식 유지 ──
    wrap.classList.remove('ct-mode');
    wrap.innerHTML = `

function TABSBrandsOf(tab){ return tab.brands; }

function renderDonutAndBar(tab, rows){
  const brands = tab.brands;
  const sum = {}; brands.forEach(b=>sum[b]=0);
  let tot=0;
  rows.forEach(r=>{ brands.forEach(b=>{ sum[b]+=r.vals[b]||0; }); tot+=r.total; });
  const shareList = brands.map((b,i)=>({name:b,val:sum[b],color:brandColor(b)}))
    .sort((a,b)=>b.val-a.val);
  const pct = shareList.map(s=> tot>0 ? +(s.val/tot*100).toFixed(1) : 0);

  document.getElementById('donutNum-'+tab.id).textContent = brands.length;
  document.getElementById('legend-'+tab.id).innerHTML = shareList.map((s,i)=>
    `<div class="legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.name} ${pct[i]}%</div>`).join('');

  const donutCtx = document.getElementById('donutChart-'+tab.id);
  if(charts['d-'+tab.id]) charts['d-'+tab.id].destroy();
  charts['d-'+tab.id] = new Chart(donutCtx, {
    type:'doughnut',
    data:{ labels:shareList.map(s=>s.name), datasets:[{ data:pct, backgroundColor:shareList.map(s=>s.color), borderWidth:3, borderColor:'#fff', hoverOffset:5 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{ legend:{display:false}, tooltip:{callbacks:{label:d=>` ${d.label}: ${d.parsed}%`}} } }
  });

  // 월별 누적 막대 (출고 데이터가 있는 달만 표시)
  const monthMap = {};
  const monthOrder = [];
  rows.forEach(r=>{
    const m = monthOf(r.date)+'월';
    if(!monthMap[m]){ monthMap[m] = {}; brands.forEach(b=>monthMap[m][b]=0); monthOrder.push(m); }
    brands.forEach(b=>{ monthMap[m][b]+= r.vals[b]||0; });
  });
  // 합계가 0인 달 제거
  const monthOrderFiltered = monthOrder.filter(m => brands.reduce((s,b)=>s+(monthMap[m][b]||0),0) > 0);
  document.getElementById('barlegend-'+tab.id).innerHTML = brands.map((b,i)=>
    `<span class="legend-item"><span class="legend-dot" style="background:${brandColor(b)}"></span>${b}</span>`).join('');
  const barCtx = document.getElementById('barChart-'+tab.id);
  if(charts['b-'+tab.id]) charts['b-'+tab.id].destroy();
  charts['b-'+tab.id] = new Chart(barCtx, {
    type:'bar',
    data:{
      labels: monthOrderFiltered,
      datasets: brands.map((b,i)=>({ label:b, data: monthOrderFiltered.map(m=>monthMap[m][b]), backgroundColor:brandColor(b), borderRadius:3 }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ stacked:true, ticks:{font:{size:11},color:'#64748b'}, grid:{display:false} },
        y:{ stacked:true, ticks:{font:{size:11},color:'#64748b',callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v}, grid:{color:'rgba(0,0,0,0.05)'} }
      }
    }
  });
}

// ──────────────── 테이블 ────────────────
function getRows(tabId){
  const tab = getTab(tabId);
  let rows = (tabData[tabId] && tabData[tabId].rows) ? [...tabData[tabId].rows] : [];
  rows = [...rows].reverse(); // 최신일자 우선
  const dateVal = document.getElementById('dateSearch-'+tabId).value;
  if(dateVal){
    const d = new Date(dateVal);
    const key = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    rows = rows.filter(r=>r.date===key);
  }
  rows = rows.filter(r=>r.total>0); // 데이터 없는 날 항상 제외
  return rows;
}
function getTotalPages(tabId){ return Math.max(1, Math.ceil(getRows(tabId).length/perPage)); }

function renderTable(tabId){
  const tab = getTab(tabId);
  const rows = getRows(tabId);
  const totalPages = getTotalPages(tabId);
  if(sheetState[tabId].currentPage>totalPages) sheetState[tabId].currentPage = totalPages;
  const start = (sheetState[tabId].currentPage-1)*perPage;
  const pageRows = rows.slice(start, start+perPage);
  const tbody = document.getElementById('tableBody-'+tabId);
  const colCount = tab.ctPcs ? (tab.brands.length*2+3) : (tab.brands.length+2);

  // ── 헤더를 브랜드 목록 기준으로 항상 동적 재생성 (자동감지 후 브랜드 변경 대응) ──
  const thead = document.getElementById('tableHead-'+tabId);
  if(thead){
    if(tab.ctPcs){
      thead.innerHTML =
        `<tr><th rowspan="2">일자</th>${tab.brands.map(b=>`<th colspan="2">${b}</th>`).join('')}<th colspan="2">합계</th></tr>` +
        `<tr>${tab.brands.map(()=>`<th>C/T</th><th>PCS</th>`).join('')}<th>C/T</th><th>PCS</th></tr>`;
    } else {
      thead.innerHTML =
        `<tr><th>일자</th>${tab.brands.map(b=>`<th>${b}</th>`).join('')}<th>합계</th></tr>`;
    }
  }

  if(pageRows.length===0){
    tbody.innerHTML = `<tr><td colspan="${colCount}" style="text-align:center;color:#94a3b8;padding:24px">표시할 데이터가 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = pageRows.map(r=>{
    const dow = getDayOfWeek(r.date);
    const dowColor = dow==='토' ? 'color:#3b82f6' : dow==='일' ? 'color:#ef4444' : 'color:#94a3b8';
    const brandCells = tab.ctPcs
      ? tab.brands.map(b=>{
          const ctVal = (r.ct && r.ct[b]) || 0;
          const pcsVal = r.vals[b] || 0;
          return `<td class="${ctVal===0?'td-zero':''}">${ctVal.toLocaleString()}</td><td class="${pcsVal===0?'td-zero':''}">${pcsVal.toLocaleString()}</td>`;
        }).join('')
      : tab.brands.map(b=>`<td class="${(r.vals[b]||0)===0?'td-zero':''}">${(r.vals[b]||0).toLocaleString()}</td>`).join('');
    return `
    <tr>
      <td class="td-date">${displayDate(r.date)} <span style="font-size:10px;font-weight:500;${dowColor}">(${dow})</span></td>
      ${brandCells}
      ${tab.ctPcs
        ? `<td class="td-total">${(r.totalCt||0).toLocaleString()}</td><td class="td-total">${r.total.toLocaleString()}</td>`
        : `<td class="td-total">${r.total.toLocaleString()}</td>`
      }
    </tr>
  `}).join('');
}
function renderPagination(tabId){
  const totalPages = getTotalPages(tabId);
  const cur = sheetState[tabId].currentPage;
  const pg = document.getElementById('pagination-'+tabId);
  const totalRows = getRows(tabId).length;
  const startRow = (cur-1)*perPage+1;
  const endRow = Math.min(cur*perPage, totalRows);
  const infoHtml = totalRows>0 ? `<span style="font-size:11px;color:#94a3b8;margin-right:8px">${startRow}–${endRow} / 총 ${totalRows}건</span>` : '';
  let html = infoHtml;
  html += `<button class="pg-btn" onclick="goPage('${tabId}',${cur-1})" ${cur===1?'disabled':''}>‹ 이전</button>`;
  const WINDOW=2;
  for(let i=1;i<=totalPages;i++){
    if(i===1||i===totalPages||(i>=cur-WINDOW&&i<=cur+WINDOW)){
      html += `<button class="pg-btn ${i===cur?'active':''}" onclick="goPage('${tabId}',${i})">${i}</button>`;
    } else if(i===cur-WINDOW-1||i===cur+WINDOW+1){
      html += `<span style="display:flex;align-items:center;color:#94a3b8;font-size:12px;padding:0 2px">…</span>`;
    }
  }
  html += `<button class="pg-btn" onclick="goPage('${tabId}',${cur+1})" ${cur===totalPages?'disabled':''}>다음 ›</button>`;
  pg.innerHTML = html;
}
function goPage(tabId,p){
  const totalPages = getTotalPages(tabId);
  if(p<1||p>totalPages) return;
  sheetState[tabId].currentPage = p;
  renderTable(tabId); renderPagination(tabId);
}
function toggleSearch(tabId){
  const panel = document.getElementById('searchPanel-'+tabId);
  const btn = document.getElementById('searchToggleBtn-'+tabId);
  const visible = panel.style.display==='flex';
  panel.style.display = visible?'none':'flex';
  btn.classList.toggle('active', !visible);
}

function applyDateFilter(tabId){ sheetState[tabId].currentPage=1; renderTable(tabId); renderPagination(tabId); }
function clearSearch(tabId){
  document.getElementById('dateSearch-'+tabId).value='';
  sheetState[tabId].currentPage=1; renderTable(tabId); renderPagination(tabId);
}

function renderTab(tabId, withCharts){
  if(tabId==='kpi'){ renderKpiTab(withCharts); return; }
  const tab = getTab(tabId);
  const rows = (tabData[tabId] && tabData[tabId].rows) || [];
  if(rows.length===0) return;
  renderCardsForTab(tab, rows);
  if(withCharts) renderDonutAndBar(tab, rows);
  renderTable(tabId);
  renderPagination(tabId);
}

function kpiFindRef(){
  const rows = (tabData['kpi']&&tabData['kpi'].rows)||[];
  // 사용자가 날짜선택 캘린더로 특정 날짜를 골랐다면 그 날짜를 최우선으로 사용
  if(selectedRefDate){
    const selRow = rows.find(r => r.date === selectedRefDate);
    if(selRow) return selRow;
  }
  // 오늘 날짜(현재 시간 기준) 우선 탐색 - YYYY/M/D 형식으로 정확 매칭
  const now = new Date();
  const todayKey = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const todayRow = rows.find(r => r.date === todayKey);
  if(todayRow && todayRow.total > 0) return todayRow;
  // 오늘 데이터가 없거나(행이 없거나) 0건이면, 데이터가 있는 가장 최근 날짜로 대체
  for(let i=rows.length-1;i>=0;i--) if(rows[i].total>0) return rows[i];
  return rows[rows.length-1]||{date:'-',total:0,miss:0,heads:0,perHead:0,perHour:0,missRate:0};
}

function renderKpiCharts(rows){
  // 주간 인당 출고 차트: 최근 14 근무일의 인당 출고량 / 시간당 (오래된 날짜→최근 날짜 순, 최근이 오른쪽)
  const active = [...rows].filter(r=>r.total>0).slice(-14);
  const weekCtx = document.getElementById('kpiWeekChart');
  if(weekCtx){
    if(charts['kpi-week']) charts['kpi-week'].destroy();
    charts['kpi-week'] = new Chart(weekCtx,{
      type:'bar',
      data:{
        labels: active.map(r=>{ const dow=getDayOfWeek(r.date); return displayDate(r.date)+'('+dow+')'; }),
        datasets:[
          { label:'인당 출고량(PCS/명)', data:active.map(r=>+r.perHead.toFixed(1)), backgroundColor:'#c7d2fe', borderRadius:4, yAxisID:'y', order:2 },
          { label:'시간당 출고량', data:active.map(r=>+r.perHour.toFixed(2)), type:'line', borderColor:'#f59e0b', backgroundColor:'#f59e0b', borderWidth:3, pointRadius:4, pointHoverRadius:6, pointBackgroundColor:'#fff', pointBorderColor:'#f59e0b', pointBorderWidth:2, tension:0.3, yAxisID:'y1', order:1, fill:false }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'top', labels:{font:{size:12,weight:'600'},boxWidth:12,padding:12} } },
        scales:{
          x:{ ticks:{font:{size:11},color:'#475569'}, grid:{display:false} },
          y:{ ticks:{font:{size:11},color:'#475569',callback:v=>v+'PCS'}, grid:{color:'rgba(0,0,0,0.06)'}, title:{display:true,text:'인당 출고량(PCS)',font:{size:11,weight:'600'}} },
          y1:{ position:'right', ticks:{font:{size:11},color:'#f59e0b',callback:v=>v+'PCS'}, grid:{display:false}, title:{display:true,text:'시간당',font:{size:11,weight:'600'},color:'#f59e0b'} }
        }
      }
    });
  }

  // 월별 집계 (인당 출고 / 오배송률 공통으로 사용)
  const monthMap = {};
  const monthOrder = [];
  rows.filter(r=>r.total>0).forEach(r=>{
    const m = monthOf(r.date)+'월';
    if(!monthMap[m]){ monthMap[m]={totalQ:0,totalH:0,days:0,miss:0}; monthOrder.push(m); }
    monthMap[m].totalQ += r.total;
    monthMap[m].totalH += r.heads;
    monthMap[m].days++;

function renderKpiTable(){
  const rows = getKpiRows();
  const totalPages = Math.max(1, Math.ceil(rows.length/perPage));
  if(kpiState.currentPage>totalPages) kpiState.currentPage=totalPages;
  const start = (kpiState.currentPage-1)*perPage;
  const pageRows = rows.slice(start, start+perPage);
  const tbody = document.getElementById('kpiTableBody');
  if(!tbody) return;
  if(pageRows.length===0){
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:24px">표시할 데이터가 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = pageRows.map(r=>{
    const dow = getDayOfWeek(r.date);
    const dowColor = dow==='토'?'color:#3b82f6':dow==='일'?'color:#ef4444':'color:#94a3b8';
    const missClass = r.missRate>1?'color:#ef4444;font-weight:700':'color:#10b981;font-weight:600';
    return `<tr>
      <td class="td-date">${displayDate(r.date)} <span style="font-size:10px;font-weight:500;${dowColor}">(${dow})</span></td>
      <td class="td-total">${r.total.toLocaleString()}</td>
      <td class="${r.miss>0?'':'td-zero'}">${r.miss.toLocaleString()}</td>
      <td><span style="${missClass}">${r.missRate.toFixed(2)}%</span></td>
      <td>${r.heads>0?r.heads+'명':'<span class="td-zero">-</span>'}</td>
      <td style="color:#4f46e5;font-weight:700">${r.heads>0?r.perHead.toFixed(1):'<span class="td-zero">-</span>'}</td>
      <td style="color:#10b981;font-weight:700">${r.heads>0?r.perHour.toFixed(2):'<span class="td-zero">-</span>'}</td>
    </tr>`;
  }).join('');
}

function renderKpiPagination(){
  const rows = getKpiRows();
  const totalPages = Math.max(1, Math.ceil(rows.length/perPage));
  const cur = kpiState.currentPage;
  const pg = document.getElementById('kpiPagination');
  if(!pg) return;
  const totalRows = rows.length;
  const startRow = (cur-1)*perPage+1;
  const endRow = Math.min(cur*perPage, totalRows);
  const infoHtml = totalRows>0?`<span style="font-size:11px;color:#94a3b8;margin-right:8px">${startRow}–${endRow} / 총 ${totalRows}건</span>`:'';
  let html = infoHtml;
  html += `<button class="pg-btn" onclick="kpiGoPage(${cur-1})" ${cur===1?'disabled':''}>‹ 이전</button>`;
  const WINDOW=2;
  for(let i=1;i<=totalPages;i++){
    if(i===1||i===totalPages||(i>=cur-WINDOW&&i<=cur+WINDOW)){
      html += `<button class="pg-btn ${i===cur?'active':''}" onclick="kpiGoPage(${i})">${i}</button>`;
    } else if(i===cur-WINDOW-1||i===cur+WINDOW+1){
      html += `<span style="display:flex;align-items:center;color:#94a3b8;font-size:12px;padding:0 2px">…</span>`;
    }
  }
  html += `<button class="pg-btn" onclick="kpiGoPage(${cur+1})" ${cur===totalPages?'disabled':''}>다음 ›</button>`;
  pg.innerHTML = html;
}

function kpiGoPage(p){
  const rows = getKpiRows();
  const totalPages = Math.max(1,Math.ceil(rows.length/perPage));
  if(p<1||p>totalPages) return;
  kpiState.currentPage = p;
  renderKpiTable(); renderKpiPagination();
}

// ──────────────── KPI AI 챗봇 ────────────────
function analyzeKpiQuery(q){
  const rows = (tabData['kpi']&&tabData['kpi'].rows)||[];
  if(rows.length===0) return '데이터를 불러오는 중입니다. 잠시 후 다시 시도해주세요.';
  const lq = q.toLowerCase().replace(/\s/g,'');
  const active = rows.filter(r=>r.total>0);
  const ref = kpiFindRef();
  const now = new Date();
  const curMonth = now.getMonth()+1;

  // 날짜 검색
  const dm = lq.match(/(\d{1,2})[\/월\s](\d{1,2})/);
  if(dm){
    const dMon=parseInt(dm[1]), dDay=parseInt(dm[2]);
    const matched2=rows.filter(r=>{ const p=r.date.split("/"); return p.length===3&&parseInt(p[1])===dMon&&parseInt(p[2])===dDay; });
    const dr = matched2.length ? matched2[matched2.length-1] : null;
    if(!dr) return `${key} 데이터가 없습니다.`;
    if(dr.total===0||dr.heads===0) return `${key}은 미근무일입니다.`;
    return `${key} 현황:\n근무인원 ${dr.heads}명, 전체출고 ${fmt(dr.total)}건\n인당 출고량 ${dr.perHead.toFixed(1)}건/명\n시간당 출고량 ${dr.perHour.toFixed(2)}건 (7h 기준)\n오배송 ${dr.miss}건 (${dr.missRate.toFixed(2)}%)`;
  }

  // 당일/오늘
  if(lq.includes('당일')||lq.includes('오늘')){
    return `당일(${displayDate(ref.date)}) 현황:\n근무인원 ${ref.heads}명, 전체출고 ${fmt(ref.total)}건\n인당 출고량 ${ref.perHead.toFixed(1)}건/명\n시간당 출고량 ${ref.perHour.toFixed(2)}건\n오배송 ${ref.miss}건 (${ref.missRate.toFixed(2)}%)`;
  }

  // 주간
  if(lq.includes('주간')||lq.includes('이번주')){
    const refIdx = rows.lastIndexOf(ref)!==-1?rows.lastIndexOf(ref):rows.length-1;
    const ws = rows.slice(Math.max(0,refIdx-6),refIdx+1).filter(r=>r.total>0);
    const wQ = ws.reduce((s,r)=>s+r.total,0);
    const wH = ws.reduce((s,r)=>s+r.heads,0);
    const wM = ws.reduce((s,r)=>s+r.miss,0);
    return `주간(${ws.length}일) 현황:\n총 출고 ${fmt(wQ)}건, 연인원 ${wH}명\n인당 평균 ${wH>0?(wQ/wH).toFixed(1):0}건/명\n시간당 평균 ${wH>0?(wQ/(wH*WORK_HOURS)).toFixed(2):0}건\n오배송 ${wM}건 (${wQ>0?(wM/wQ*100).toFixed(2):0}%)`;
  }

  // 월간
  if(lq.includes('월간')||lq.includes('이번달')||lq.includes('월')){
    const ms = rows.filter(r=>monthOf(r.date)===curMonth&&r.total>0);
    const mQ = ms.reduce((s,r)=>s+r.total,0);
    const mH = ms.reduce((s,r)=>s+r.heads,0);
    const mM = ms.reduce((s,r)=>s+r.miss,0);
    return `${curMonth}월 현황(${ms.length}일):\n총 출고 ${fmt(mQ)}건, 연인원 ${mH}명\n인당 평균 ${mH>0?(mQ/mH).toFixed(1):0}건/명\n시간당 평균 ${mH>0?(mQ/(mH*WORK_HOURS)).toFixed(2):0}건\n오배송 ${mM}건 (${mQ>0?(mM/mQ*100).toFixed(2):0}%)`;
  }

  // 최고 생산성
  if(lq.includes('최고')||lq.includes('최대')||lq.includes('베스트')){
    const best = [...active].sort((a,b)=>b.perHead-a.perHead)[0];
    return `인당 출고량 최고일은 ${displayDate(best.date)}로 ${best.perHead.toFixed(1)}건/명 (시간당 ${best.perHour.toFixed(2)}건, 근무 ${best.heads}명)`;
  }

  // 오배송
  if(lq.includes('오배송')){
    const totalMiss = active.reduce((s,r)=>s+r.miss,0);
    const totalQ = active.reduce((s,r)=>s+r.total,0);
    const worst = [...active].sort((a,b)=>b.missRate-a.missRate)[0];
    return `오배송 현황:\n누적 오배송 ${totalMiss}건 / 전체 ${fmt(totalQ)}건 (${totalQ>0?(totalMiss/totalQ*100).toFixed(2):0}%)\n최고 오배송률: ${displayDate(worst.date)} ${worst.missRate.toFixed(2)}% (${worst.miss}건)`;
  }

  // 평균 / 인당
  if(lq.includes('평균')||lq.includes('인당')){
    const totalQ = active.reduce((s,r)=>s+r.total,0);
    const totalH = active.reduce((s,r)=>s+r.heads,0);
    return `전체 기간 평균:\n인당 출고량 ${totalH>0?(totalQ/totalH).toFixed(1):0}건/명\n시간당 출고량 ${totalH>0?(totalQ/(totalH*WORK_HOURS)).toFixed(2):0}건 (7h 기준)`;
  }

  return '질문 예시: "당일 인당 출고량", "이번주 시간당 생산성", "오배송 현황", "최고 생산성 날짜", "월간 현황"';
}

function fmt(n){ return Math.round(n).toLocaleString(); }
function findDateRow(rows,q){
  const m = q.match(/(\d{1,2})[\/월\s]\s?(\d{1,2})/);
  if(!m) return null;
  const mon = parseInt(m[1]), day = parseInt(m[2]);
  const matched = rows.filter(r=>{ const p=r.date.split("/"); return p.length===3&&parseInt(p[1])===mon&&parseInt(p[2])===day; });
  return matched.length ? matched[matched.length-1] : null;
}
function findBrandInQuery(q, brands){
  for(const b of brands){ if(q.includes(b.toLowerCase())) return b; }
  return null;
}

// 질문에서 대상 탭을 감지: 명시된 시트명이 있으면 그 탭, 없으면 현재 탭
const TAB_ALIASES = {
  'rtw온라인':   'rtw-on',  'rtw-온라인': 'rtw-on',  'rtw 온라인': 'rtw-on',
  'bag온라인':   'bag-on',  'bag-온라인': 'bag-on',  'bag 온라인': 'bag-on',
  'rtw오프라인': 'rtw-off', 'rtw-오프라인':'rtw-off', 'rtw 오프라인':'rtw-off',
  '오프라인':    'rtw-off',
  '온라인rtw':   'rtw-on',  '온라인bag':  'bag-on',
  '오프라인rtw': 'rtw-off',
  'rtw':         'rtw-on',  // 단독 RTW → 온라인 우선
  '인력kpi':     'kpi',     'kpi':        'kpi',
};
function detectTargetTab(lq, currentTabId){
  for(const [alias, id] of Object.entries(TAB_ALIASES)){
    if(lq.includes(alias)) return id;
  }
  return currentTabId;
}

// 모든 시트(KPI 제외) 합산 분석
function analyzeAllTabs(lq){
  const nonKpi = TABS.filter(t=>t.id!=='kpi');
  const allLoaded = nonKpi.every(t=>tabData[t.id]&&tabData[t.id].rows&&tabData[t.id].rows.length>0);
  if(!allLoaded) return '일부 시트 데이터가 아직 로드 중입니다. 잠시 후 다시 시도해주세요.';

  // 날짜 기준점: 가장 데이터가 많은 탭의 refIndex 기준
  const refDateMap = {};
  nonKpi.forEach(t=>{
    const rows = tabData[t.id].rows;
    const ri = findRefIndex(rows);
    refDateMap[t.id] = rows[ri];
  });

  // 당일 합계
  if(lq.includes('당일')||lq.includes('오늘')){
    const lines = nonKpi.map(t=>{
      const ref = refDateMap[t.id];
      return `${t.label}: ${fmt(ref.total)}건 (${displayDate(ref.date)} 기준)`;
    });
    const grandTotal = nonKpi.reduce((s,t)=>s+refDateMap[t.id].total,0);
    return `전체 시트 당일 출고 합계: ${fmt(grandTotal)}건\n\n` + lines.join('\n');
  }

  // 주간 합계
  if(lq.includes('주간')||lq.includes('이번주')){
    const lines = nonKpi.map(t=>{
      const rows = tabData[t.id].rows;
      const ri = findRefIndex(rows);
      const wd = rows.slice(Math.max(0,ri-6),ri+1);
      const wt = wd.reduce((s,r)=>s+r.total,0);
      return `${t.label}: ${fmt(wt)}건`;
    });
    return `전체 시트 주간 출고 현황:\n\n` + lines.join('\n');
  }

  // 월간 합계
  if(lq.includes('월간')||lq.includes('이번달')){
    const lines = nonKpi.map(t=>{
      const rows = tabData[t.id].rows;
      const ref = refDateMap[t.id];
      const md = rows.filter(r=>monthOf(r.date)===monthOf(ref.date));
      const mt = md.reduce((s,r)=>s+r.total,0);
      return `${t.label}: ${fmt(mt)}건`;
    });
    return `전체 시트 월간 출고 현황:\n\n` + lines.join('\n');
  }

  // 누적 합계
  const lines = nonKpi.map(t=>{
    const rows = tabData[t.id].rows;
    const total = rows.reduce((s,r)=>s+r.total,0);
    return `${t.label}: ${fmt(total)}건`;
  });
  const grand = nonKpi.reduce((s,t)=>s+tabData[t.id].rows.reduce((ss,r)=>ss+r.total,0),0);
  return `전체 시트 누적 출고 합계: ${fmt(grand)}건\n\n` + lines.join('\n');
}

// RTW vs BAG 시트간 비교 (오프라인은 단일 시트로 통합되어 비교 대상 없음)
function analyzeComparison(lq){
  const isOnline  = lq.includes('온라인');
  const isOffline = lq.includes('오프라인');
  if(isOffline && !isOnline){
    return '오프라인은 단일 시트로 통합되어 RTW vs BAG 비교를 제공하지 않습니다.';
  }
  const pairs = [['rtw-on','bag-on']];

  const results = pairs.map(([aId,bId])=>{
    const tA = getTab(aId), tB = getTab(bId);
    const rA = (tabData[aId]&&tabData[aId].rows)||[];
    const rB = (tabData[bId]&&tabData[bId].rows)||[];
    if(!rA.length||!rB.length) return `${tA.label} / ${tB.label} 데이터 로드 중`;

    if(lq.includes('당일')||lq.includes('오늘')){
      const refA = rA[findRefIndex(rA)], refB = rB[findRefIndex(rB)];
      return `[${tA.label} vs ${tB.label} 당일]\n${tA.label}: ${fmt(refA.total)}건\n${tB.label}: ${fmt(refB.total)}건`;
    }
    if(lq.includes('월간')||lq.includes('이번달')){
      const refA = rA[findRefIndex(rA)];
      const mA = rA.filter(r=>monthOf(r.date)===monthOf(refA.date)).reduce((s,r)=>s+r.total,0);
      const mB = rB.filter(r=>monthOf(r.date)===monthOf(refA.date)).reduce((s,r)=>s+r.total,0);
      return `[${tA.label} vs ${tB.label} 월간]\n${tA.label}: ${fmt(mA)}건\n${tB.label}: ${fmt(mB)}건`;
    }
    const totA = rA.reduce((s,r)=>s+r.total,0);
    const totB = rB.reduce((s,r)=>s+r.total,0);
    return `[${tA.label} vs ${tB.label} 누적]\n${tA.label}: ${fmt(totA)}건\n${tB.label}: ${fmt(totB)}건`;
  });
  return results.join('\n\n');
}

function analyzeSingleTab(tabId, lq){
  const tab = getTab(tabId);
  const rows = (tabData[tabId] && tabData[tabId].rows) || [];
  if(rows.length===0) return `[${tab.label}] 데이터를 불러오는 중입니다. 잠시 후 다시 시도해주세요.`;
  const prefix = `[${tab.label}] `;
  const refIdx = findRefIndex(rows);
  const ref = rows[refIdx];
  const totalAll = rows.reduce((s,r)=>s+r.total,0);
  const activeDays = rows.filter(r=>r.total>0);
  const zeroDays = rows.filter(r=>r.total===0);
  const maxDay = [...rows].sort((a,b)=>b.total-a.total)[0];
  const operatingRate = ((activeDays.length/rows.length)*100).toFixed(1);
  const avgPerActive = activeDays.length? (totalAll/activeDays.length) : 0;

  // 모든 시트 브랜드 통합 검색
  const allBrands = [...new Set(TABS.filter(t=>t.id!=='kpi').flatMap(t=>t.brands))];
  const dateRow = findDateRow(rows, lq);
  const brand = findBrandInQuery(lq, allBrands.map(b=>b.toLowerCase()))
    ? allBrands.find(b=>lq.includes(b.toLowerCase())) : null;

  if(dateRow){
    if(dateRow.total===0) return prefix+`${displayDate(dateRow.date)}은 출고 데이터가 없는 날입니다 (휴무 또는 미가동).`;
    if(brand && dateRow.vals[brand]!==undefined){
      const val = dateRow.vals[brand]||0;
      return prefix+`${displayDate(dateRow.date)} ${brand} 출고량은 ${fmt(val)}건으로, 당일 전체(${fmt(dateRow.total)}건)의 ${((val/dateRow.total)*100).toFixed(1)}%입니다.`;
    }
    const sorted = tab.brands.map(b=>({name:b,val:dateRow.vals[b]||0})).filter(b=>b.val>0).sort((a,b)=>b.val-a.val);
    return prefix+`${displayDate(dateRow.date)} 총 출고량은 ${fmt(dateRow.total)}건입니다.\n브랜드별: ${sorted.map((b,i)=>`${i+1}위 ${b.name} ${fmt(b.val)}건`).join(', ')}`;
  }
  if(brand){
    const brandTotal = rows.reduce((s,r)=>s+(r.vals[brand]||0),0);
    if(brandTotal===0) return prefix+`${brand} 브랜드 데이터가 이 시트에 없습니다.`;
    const share = totalAll>0 ? (brandTotal/totalAll*100).toFixed(1) : 0;
    if(lq.includes('당일')||lq.includes('오늘')){
      const val = ref.vals[brand]||0;
      return prefix+`당일(${displayDate(ref.date)}) ${brand} 출고량은 ${fmt(val)}건으로 오늘 전체(${fmt(ref.total)}건)의 ${ref.total>0?((val/ref.total)*100).toFixed(1):0}%입니다.`;
    }
    if(lq.includes('최고')||lq.includes('최대')||lq.includes('많은')){
      const best=[...rows].filter(r=>(r.vals[brand]||0)>0).sort((a,b)=>(b.vals[brand]||0)-(a.vals[brand]||0))[0];
      if(!best) return prefix+`${brand}의 출고 데이터가 없어서 답변 드릴 수 없습니다.`;
      return prefix+`${brand}의 일 최고 출고일은 ${displayDate(best.date)}로 ${fmt(best.vals[brand])}건이 출고되었습니다.`;
    }
    const rank = tab.brands.map(b=>({name:b,val:rows.reduce((s,r)=>s+(r.vals[b]||0),0)})).sort((a,b)=>b.val-a.val).findIndex(b=>b.name===brand)+1;
    return prefix+`${brand}의 누적 출고량은 ${fmt(brandTotal)}건이며, 전체 비중 ${share}%로 ${rank>0?rank+'위':''}입니다.`;
  }
  if(lq.includes('당일')||lq.includes('오늘')){
    const sorted = tab.brands.map(b=>({name:b,val:ref.vals[b]||0})).filter(b=>b.val>0).sort((a,b)=>b.val-a.val);
    return prefix+`당일(${displayDate(ref.date)}) 총 출고량은 ${fmt(ref.total)}건입니다.\n상위 브랜드: ${sorted.slice(0,3).map((b,i)=>`${i+1}위 ${b.name} ${fmt(b.val)}건`).join(', ')}`;
  }
  if(lq.includes('주간')||lq.includes('이번주')){
    const wd = rows.slice(Math.max(0,refIdx-6), refIdx+1);
    const wt = wd.reduce((s,r)=>s+r.total,0);
    const wa = wd.filter(r=>r.total>0).length||1;
    return prefix+`주간(${displayDate(wd[0].date)}~${displayDate(ref.date)}) 총 출고량은 ${fmt(wt)}건이며, 근무 ${wa}일 기준 일평균 ${fmt(wt/wa)}건입니다.`;
  }
  if(lq.includes('월간')||lq.includes('이번달')){
    const md = rows.filter(r=>monthOf(r.date)===monthOf(ref.date));
    const mt = md.reduce((s,r)=>s+r.total,0);
    const ma = md.filter(r=>r.total>0).length||1;
    return prefix+`${monthOf(ref.date)}월 누적 총 출고량은 ${fmt(mt)}건이며, 근무 ${ma}일 기준 일평균 ${fmt(mt/ma)}건입니다.`;
  }
  if(lq.includes('최고')||lq.includes('최대')||lq.includes('가장많')||lq.includes('최다'))
    return prefix+`최고 출고일은 ${displayDate(maxDay.date)}로 총 ${fmt(maxDay.total)}건이 출고되었습니다.`;
  if(lq.includes('최저')||lq.includes('가장적')||lq.includes('최소')){
    if(activeDays.length===0) return prefix+'근무일 데이터가 없습니다.';
    const minDay=[...activeDays].sort((a,b)=>a.total-b.total)[0];
    return prefix+`근무일 중 최저 출고일은 ${displayDate(minDay.date)}로 ${fmt(minDay.total)}건이었습니다.`;
  }
  if(lq.includes('가동')||lq.includes('운영'))
    return prefix+`총 ${rows.length}일 중 근무일 ${activeDays.length}일, 미근무일 ${zeroDays.length}일\n가동률 ${operatingRate}%, 근무일 기준 일평균 ${fmt(avgPerActive)}건입니다.`;
  if(lq.includes('순위')||lq.includes('비중')||lq.includes('점유')||lq.includes('랭킹')){
    const list = tab.brands.map(b=>({name:b,val:rows.reduce((s,r)=>s+(r.vals[b]||0),0)})).sort((a,b)=>b.val-a.val)
      .map((b,i)=>`${i+1}위 ${b.name} ${totalAll>0?(b.val/totalAll*100).toFixed(1):0}%`).join(', ');
    return prefix+`브랜드별 출고 비중 순위:\n${list}`;
  }
  if(lq.includes('총')||lq.includes('합계')||lq.includes('누적'))
    return prefix+`총 누적 출고량은 ${fmt(totalAll)}건입니다.\n근무일(${activeDays.length}일) 기준 일평균 ${fmt(avgPerActive)}건입니다.`;
  if(lq.includes('평균')||lq.includes('일평균'))
    return prefix+`근무일(${activeDays.length}일) 기준 일평균 출고량은 ${fmt(avgPerActive)}건입니다.`;
  if(lq.includes('휴무')||lq.includes('미가동')||lq.includes('쉰')||lq.includes('0건'))
    return prefix+`미근무일(출고 0건)은 총 ${zeroDays.length}일입니다.`;
  return prefix+'데이터가 없어서 답변 드릴 수 없습니다.\n\n질문 예시:\n• "당일 출고량" / "RTW온라인 당일 출고량"\n• "루에브르 총 출고량" / "RTW오프라인 조이그라이슨 순위"\n• "전체 시트 오늘 합계" / "RTW온라인 vs BAG온라인 월간 비교"';
}

function analyzeQuery(tabId, q){
  const lq = q.toLowerCase().replace(/\s/g,'');

  // 전체 시트 통합 질문
  const isAllSheet = lq.includes('전체시트')||lq.includes('전시트')||lq.includes('모든시트')||lq.includes('전체합계');
  if(isAllSheet) return analyzeAllTabs(lq);

  // 시트간 비교 질문 (vs, 비교, 온라인+오프라인 동시 언급)
  const isCompare = lq.includes('vs')||lq.includes('비교')||lq.includes('대비')||(lq.includes('온라인')&&lq.includes('오프라인'));
  if(isCompare) return analyzeComparison(lq);

  // 특정 시트 명시 또는 현재 시트 분석
  const targetTabId = detectTargetTab(lq, tabId);
  return analyzeSingleTab(targetTabId, lq);
}
function sendChat(tabId){
  const input = document.getElementById('chatInput-'+tabId);
  const box = document.getElementById('chatBox-'+tabId);
  const msg = input.value.trim();
  if(!msg) return;
  const userDiv = document.createElement('div');
  userDiv.className='msg-user'; userDiv.textContent=msg;
  box.appendChild(userDiv); box.scrollTop = box.scrollHeight; input.value='';
  setTimeout(()=>{
    const reply = document.createElement('div');
    reply.className='msg-ai';
    reply.innerHTML = `<div class="msg-ai-name">AI 비서</div>${analyzeQuery(tabId,msg).replace(/\n/g,'<br>')}`;
    box.appendChild(reply); box.scrollTop = box.scrollHeight;
  }, 350);
}

  document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock(); setInterval(updateClock,1000);

loadAll(false);
setInterval(()=>loadAll(false), REFRESH_MS);
